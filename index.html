<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Álvaro Terroso · FullStack Engineer</title>
  <meta name="description" content="Portugal">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
    }

    .container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .bg-gradient {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(18, 18, 18, 1) 0%, rgba(0, 0, 0, 1) 100%);
      opacity: 0.5;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
    }

    h1 {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: -0.05em;
      color: #fff;
    }

    a {
      color: #fff;
      text-decoration: underline;
      transition: color 0.15s ease;
    }

    a:hover {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-gradient"></div>
    <div class="content">
      <h1>Álvaro Terroso. FullStack Engineer at <a href="https://bloq.it" target="_blank" rel="noopener noreferrer">Bloq.it</a>. Portugal</h1>
    </div>
  </div>
</body>
</html>
